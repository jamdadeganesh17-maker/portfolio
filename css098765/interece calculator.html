<!DOCTYPE html>
<html>
<head>
    <title>Simple Interest Calculator</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#e9e9e9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#007bff;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin:15px 0 8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:4px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:4px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0069d9;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            color:#333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Simple Interest Calculator</h1>

    <label>Principal Amount ($):</label>
    <input type="number" id="principal" value="50000">

    <label>Annual Interest Rate (%):</label>
    <input type="number" id="rate" value="10">

    <label>Number of Years:</label>
    <input type="number" id="years" value="2">

    <button onclick="calculateSI()">Calculate</button>

    <p id="result"></p>
</div>

<script>
function calculateSI() {
    let p = Number(document.getElementById("principal").value);
    let r = Number(document.getElementById("rate").value);
    let t = Number(document.getElementById("years").value);

    let interest = (p * r * t) / 100;
    let total = p + interest;

    document.getElementById("result").innerHTML =
        `After ${t} years, your investment will be worth $${total.toFixed(2)} with simple interest.`;
}
</script>

</body>
</html>
