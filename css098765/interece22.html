<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interest Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:450px;
    border:none;
    border-radius:15px;
}

#show{
    background:#f8f9fa;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="card shadow-lg">
    <div class="card-body">

        <h2 class="text-center mb-4">Interest Calculator</h2>

        <form onsubmit="return calculate()">

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" id="amount" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Time (Months)</label>
                <input type="number" id="time" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Rate (%)</label>
                <input type="number" id="rate" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">
                Calculate
            </button>

            <div id="show" class="mt-3"></div>

        </form>

    </div>
</div>

<script>
function calculate(){

    let p = parseFloat(document.getElementById("amount").value);
    let t = parseFloat(document.getElementById("time").value);
    let r = parseFloat(document.getElementById("rate").value);

    let si = (p * r * t) / (100 * 12);

    let total = p + si;

    document.getElementById("show").innerHTML = `
        <strong>Amount:</strong> ₹${p}<br>
        <strong>Rate:</strong> ${r}%<br>
        <strong>Time:</strong> ${t} Months<br>
        <hr>
        <strong>Simple Interest:</strong> ₹${si.toFixed(2)}<br>
        <strong>Total Amount:</strong> ₹${total.toFixed(2)}
    `;

    return false;
}
</script>

</body>
</html>
